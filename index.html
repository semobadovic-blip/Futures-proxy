<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Futures">
<meta name="theme-color" content="#080808">
<title>Futures Kalender</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--bg2:#0f0f0f;--card:#141414;--card2:#1a1a1a;--border:#1e1e1e;--muted:#3d3d3d;--dim:#5a5a5a;--text:#aaa;--bright:#ececec;--buy:#22c55e;--sell:#ef4444;--neut:#f59e0b;--high:#ef4444;--med:#f59e0b;--low:#3b82f6;--nq:#a78bfa;--ym:#22c55e;--nk:#fb923c;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,8,8,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px 12px;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.app-name{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--bright);letter-spacing:.5px;}
.chips{display:flex;gap:5px;}
.chip{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 7px;border-radius:4px;letter-spacing:.5px;}
.chip.nq{color:var(--nq);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);}
.chip.ym{color:var(--ym);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.18);}
.chip.nk{color:var(--nk);background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.18);}
.nav{display:flex;align-items:center;gap:8px;}
.nav-btn{width:28px;height:28px;border-radius:5px;background:var(--card2);border:1px solid var(--border);color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-month{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--bright);flex:1;}
.nav-today{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);background:var(--card2);border:1px solid var(--border);padding:3px 9px;border-radius:4px;cursor:pointer;}
.status{display:flex;align-items:center;gap:7px;padding:5px 16px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--buy);}
.legend{display:flex;gap:10px;padding:6px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.ldot{width:5px;height:5px;border-radius:50%;}
.cal{padding:10px 12px 6px;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;}
.dow{text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);padding-bottom:3px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day{aspect-ratio:1;border-radius:6px;background:var(--card);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px 2px;cursor:pointer;transition:background .12s;}
.day.empty{background:transparent;border:none;cursor:default;}
.day.today{border-color:var(--dim)!important;background:var(--card2);}
.day.today .dnum{color:var(--bright);}
.day.active{border-color:var(--nq)!important;background:rgba(167,139,250,.06);}
.day.day-buy{background:rgba(34,197,94,.05);}
.day.day-sell{background:rgba(239,68,68,.05);}
.day.day-pre{border-color:rgba(245,158,11,.3)!important;}
.day.day-claude{background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.3)!important;}
.dnum{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);line-height:1;margin-bottom:3px;}
.dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.dot{width:4px;height:4px;border-radius:50%;}
.dot.high{background:var(--high);}
.dot.med{background:var(--med);}
.dot.low{background:var(--low);}
.dot.claude{background:var(--nq);}
.day-sig{font-family:'DM Mono',monospace;font-size:7px;font-weight:500;margin-top:1px;}
.day-sig.buy{color:var(--buy);}
.day-sig.sell{color:var(--sell);}
.day-sig.pre{color:var(--neut);font-size:6px;}
.no-data-month{margin:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px 16px;text-align:center;}
.ndm-title{font-family:'DM Mono',monospace;font-size:12px;color:var(--bright);margin-bottom:6px;}
.ndm-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);line-height:1.7;}
.divider{height:1px;background:var(--border);margin:4px 0;}
.detail{display:none;padding:12px 12px 80px;}
.detail.show{display:block;}
.detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.detail-datum{font-family:'DM Mono',monospace;font-size:11px;color:var(--bright);font-weight:500;}
.close-btn{width:26px;height:26px;background:var(--card2);border:1px solid var(--border);color:var(--dim);border-radius:5px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.info-banner{display:flex;align-items:center;gap:7px;background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-radius:6px;padding:6px 10px;margin-bottom:10px;font-family:'DM Mono',monospace;font-size:9px;color:var(--nq);}
.kombi-banner{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:8px 11px;margin-bottom:10px;font-family:'DM Mono',monospace;font-size:9px;}
.kombi-title{color:var(--buy);font-weight:500;margin-bottom:4px;}
.kombi-signals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:5px;}
.kombi-box{background:var(--bg2);border-radius:4px;padding:5px;text-align:center;}
.kombi-lbl{font-size:8px;color:var(--dim);margin-bottom:2px;}
.no-events{text-align:center;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:28px 0;}
.ev-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.ev-card.high{border-left:3px solid var(--high);}
.ev-card.med{border-left:3px solid var(--med);}
.ev-card.low{border-left:3px solid var(--low);}
.ev-card.claude{border-left:3px solid var(--nq);background:rgba(167,139,250,.04);}
.ev-top{display:flex;align-items:center;gap:7px;padding:9px 11px 7px;}
.ev-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);white-space:nowrap;min-width:52px;}
.ev-flag{font-size:12px;}
.ev-name{font-size:12px;font-weight:500;color:var(--bright);flex:1;line-height:1.3;}
.imp{font-family:'DM Mono',monospace;font-size:8px;font-weight:500;padding:2px 5px;border-radius:3px;white-space:nowrap;}
.imp.high{color:var(--high);background:rgba(239,68,68,.1);}
.imp.med{color:var(--med);background:rgba(245,158,11,.1);}
.imp.low{color:var(--low);background:rgba(59,130,246,.1);}
.imp.claude{color:var(--nq);background:rgba(167,139,250,.1);}
.zahlen{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:0 11px 8px;}
.zbox{background:var(--bg2);border-radius:5px;padding:6px 7px;text-align:center;}
.zlbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-bottom:2px;}
.zval{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text);}
.zval.beat{color:var(--buy);}
.zval.miss{color:var(--sell);}
.sig-wrap{padding:0 11px 8px;}
.sig-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.5px;margin-bottom:5px;}
.sig-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:4px;}
.sbox{background:var(--bg2);border-radius:5px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.sfut{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);}
.sbadge{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:3px;}
.sbadge.buy{color:var(--buy);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);}
.sbadge.sell{color:var(--sell);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);}
.sbadge.neut{color:var(--neut);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.18);}
.sig-basis{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px;}
.analyse{margin:0 11px 10px;background:var(--bg2);border-radius:5px;padding:7px 9px;}
.analyse-titel{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-bottom:5px;}
.aline{display:flex;gap:5px;font-size:11px;color:var(--dim);line-height:1.45;margin-bottom:3px;}
.aline .ai{flex-shrink:0;font-size:10px;}
.aline.warn span{color:var(--neut);}
.vorabend{margin:0 11px 8px;padding:7px 9px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:5px;font-size:10px;color:var(--neut);line-height:1.6;font-family:'DM Mono',monospace;}
</style>
</head>

<div class="hdr">

      <span class="chip ym">YM1!</span>
      <span class="chip nk">NK1!</span>

  </div>

</div>

<div class="status">

  <span id="statusText">Signale aktiv 脗路 2026</span>
</div>

<div class="legend">

  <div class="leg"><div class="ldot" style="background:var(--low)"></div>Low</div>
  <div class="leg"><div class="ldot" style="background:var(--buy)"></div>BUY</div>
  <div class="leg"><div class="ldot" style="background:var(--sell)"></div>SELL</div>
  <div class="leg"><div class="ldot" style="background:var(--neut)"></div>Vorabend</div>
</div>

<div class="cal">
  <div class="cal-dow">
    <div class="dow">Mo</div><div class="dow">Di</div><div class="dow">Mi</div>
    <div class="dow">Do</div><div class="dow">Fr</div><div class="dow">Sa</div><div class="dow">So</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div id="noDataBanner" style="display:none">
  <div class="no-data-month">
    <div style="font-size:28px;margin-bottom:10px">冒聼聯颅</div>
    <div class="ndm-title">Keine Daten</div>
    <div class="ndm-sub">Tippe "Heute" um zum aktuellen Monat zu springen.</div>
  </div>
</div>

<div class="divider"></div>

<div class="detail" id="detail">
  <div class="detail-hdr">
    <div class="detail-datum" id="detailDatum"></div>
    <button class="close-btn" onclick="closeDay()">脙聴</button>
  </div>
  <div id="evContainer"></div>
</div>

function berechneKontext(){
  // Einfache zuverl脙陇ssige Logik:
  // FOMC senkt Zinsen = Bull-Modus (Fed-Put aktiv)
  // FOMC erh脙露ht = Bear-Modus
  // Alles andere = neutral 芒聠聮 Einzelsignale entscheiden

  const fomcEvs = EVENTS.filter(e=>e.name.includes('FOMC')&&e.prev&&e.forecast);

  if(fomcEvs.length){
    const fc = parseFloat(fomcEvs[0].forecast||'4.25');
    const pv = parseFloat(fomcEvs[0].prev||'4.25');

    if(fc < pv){
      // Fed senkt 芒聠聮 Bull-Modus
      KONTEXT.modus = 'bull';
      KONTEXT.description = `Fed senkt Zinsen ${pv}%芒聠聮${fc}% 芒聠聮 Zinssenkungszyklus 芒聠聮 Risk-on`;
    } else if(fc > pv){
      // Fed erh脙露ht 芒聠聮 Bear-Modus
      KONTEXT.modus = 'bear';
      KONTEXT.description = `Fed erh脙露ht Zinsen ${pv}%芒聠聮${fc}% 芒聠聮 Liquidit脙陇t sinkt 芒聠聮 Risk-off`;
    } else {
      // Zinsen stabil 芒聠聮 neutral, Einzelsignale entscheiden
      KONTEXT.modus = 'neutral';
      KONTEXT.description = `Fed Pause bei ${fc}% 芒聠聮 Einzelsignale entscheidend`;
    }
  } else {
    KONTEXT.modus = 'neutral';
    KONTEXT.description = 'Kein FOMC-Signal verf脙录gbar';
  }

  // Einpreisung: nur z脙陇hlen wie viele Senkungen bereits passiert
  const senkungen = EVENTS.filter(e=>e.name.includes('FOMC')&&e.actual&&e.prev&&
    parseFloat(e.actual)<parseFloat(e.prev)).length;
  KONTEXT.einpreisung = senkungen>=3?'stark':senkungen>=1?'normal':'schwach';
  if(senkungen>=3) KONTEXT.description += ' 脗路 芒職聽 Viele Senkungen eingepreist';
}

function kontextBoost(s){
  // Kontext beeinflusst NUR neutrale Signale
  // Klare BUY/SELL Signale bleiben immer erhalten 芒聙聰 nie 脙录berschreiben!
  if(s==='neut'){
    if(KONTEXT.modus==='bull') return 'buy';
    if(KONTEXT.modus==='bear') return 'sell';
  }
  // BUY bleibt BUY, SELL bleibt SELL 芒聙聰 Kontext dreht nie ein klares Signal um
  return s;
}

        ?`PCE ${v1}% 芒聣陇 ${v2}% 芒聠聮 Feds Lieblingsindikator sinkt 芒聠聮 Zinssenkung n脙陇her 芒聠聮 BUY`

    }else{nq=ym='buy';nk='neut';gr=['PCE: Sinkende Tendenz 芒聠聮 BUY-Tendenz'];}

  // FOMC 芒聙聰 Analyst: Zinssenkung = mehr Liquidit脙陇t = NQ steigt
  // Gr脙露脙聼e der Senkung und Dot Plot entscheidend
  else if(n.includes('fomc')){
    if(v1!==null&&v2!==null){

      if(senkung>=0.5){nq=ym=nk='buy';gr=[`FOMC: Gro脙聼e Senkung -${senkung}% 芒聠聮 ${v2}%芒聠聮${v1}% 芒聠聮 starke Liquidit脙陇tszufuhr 芒聠聮 starkes BUY`];}
      else if(senkung>0){nq=ym=nk='buy';gr=[`FOMC: Senkung -${senkung}% 芒聠聮 ${v2}%芒聠聮${v1}% 芒聠聮 Liquidit脙陇t steigt 芒聠聮 BUY NQ/YM/NK`];}
      else if(senkung===0){
        nq=ym=nk=KONTEXT.modus==='bull'?'buy':'neut';
        gr=['FOMC: Zinsen unver脙陇ndert 芒聠聮 Markt schaut auf Dot Plot & Statement',
            KONTEXT.modus==='bull'?'Bull-Modus: Pause = weitere Senkung kommt 芒聠聮 BUY':'Pause = abwarten'];
        hi=['Hawkisher Ton 芒聠聮 SELL | Dovisher Ton 芒聠聮 BUY'];
      }
      else{nq=ym=nk='sell';gr=[`FOMC: Erh脙露hung +${-senkung}% 芒聠聮 ${v2}%芒聠聮${v1}% 芒聠聮 Liquidit脙陇t sinkt 芒聠聮 SELL`];}
    }else if(fc!==null&&pv!==null){
      const senkung=pv-fc;
      if(senkung>0){nq=ym=nk='buy';gr=[`FOMC: Senkung auf ${fc}% erwartet (von ${pv}%) 芒聠聮 BUY-Tendenz`];}
      else{nq=ym=nk=KONTEXT.modus==='bull'?'buy':'neut';gr=['FOMC: Pause erwartet 芒聠聮 Statement entscheidend'];}

    }else{
      nq=ym=nk='buy';
      gr=['FOMC: Zinssenkungszyklus aktiv 芒聠聮 jede Senkung = BUY NQ/YM/NK'];
      hi=['Statement-Wortlaut entscheidend'];
    }
  }

  // BOJ 芒聙聰 Zinserh脙露hung = Yen st脙陇rkt = SELL NK
  else if(n.includes('boj')||(n.includes('interest rate')&&cur==='JPY')){
    if(v1!==null&&v2!==null){
      if(v1>v2){nq=ym='neut';nk='sell';gr=[`BOJ: Zinserh脙露hung ${v2}% 芒聠聮 ${v1}% 芒聠聮 Yen st脙陇rkt 芒聠聮 Exporteure leiden 芒聠聮 SELL NK`];}
      else if(v1===v2){nq=ym='neut';nk='neut';gr=['BOJ: Zinsen unver脙陇ndert 芒聠聮 NK neutral'];hi=['N脙陇chste Erh脙露hung erwartet 芒聠聮 mittelfristig SELL NK'];}
      else{nq=ym='neut';nk='buy';gr=[`BOJ: Zinssenkung 芒聠聮 Yen schw脙陇cher 芒聠聮 Exporteure profitieren 芒聠聮 BUY NK`];}
    }else{
      nq=ym='neut';nk='sell';
      gr=['BOJ: Zinserh脙露hungszyklus 芒聠聮 Tendenz SELL NK'];

  // TANKAN 芒聙聰 Bessere Stimmung = BUY NK
  else if(n.includes('tankan')){

        `Basis: ${basis}`];
    }else{nk='buy';nq=ym='neut';gr=['Tankan: Positive Tendenz erwartet 芒聠聮 BUY NK'];}
  }

  // ISM MANUFACTURING 芒聙聰 Unter 50 = Rezession = Fed senkt = BUY (paradox aber real)
  else if(n.includes('ism manuf')||n.includes('ism mfg')||(n.includes('ism')&&n.includes('manuf'))){
    if(v1!==null){
      if(v1<45){nq=ym='buy';nk='neut';gr=[`ISM ${v1} 芒聙聰 starke Kontraktion 芒聠聮 Rezessionsangst 芒聠聮 Fed senkt aggressiv 芒聠聮 BUY`];}
      else if(v1<50){nq=ym='neut';nk='neut';gr=[`ISM ${v1} < 50 芒聠聮 leichte Kontraktion 芒聠聮 Fed-Druck sinkt 芒聠聮 neutral`];}
      else{const beat=v2!==null?v1>v2:true;nq=ym=beat?'sell':'neut';nk='neut';gr=[`ISM ${v1} > 50 芒聠聮 Expansion 芒聠聮 Wirtschaft stark 芒聠聮 Fed bleibt 芒聠聮 ${beat?'SELL-Tendenz':'neutral'}`];}
    }else{nq=ym='neut';gr=['ISM Manufacturing: Warte auf Daten'];}
  }

  // ISM SERVICES 芒聙聰 St脙陇rke h脙陇lt Fed zur脙录ck = SELL
  else if(n.includes('ism serv')||(n.includes('ism')&&n.includes('serv'))){
    if(v1!==null){
      if(v1>55){nq=ym='sell';nk='neut';gr=[`ISM Services ${v1} > 55 芒聠聮 Dienstleistungen boomen 芒聠聮 Inflation bleibt 芒聠聮 Fed hawkish 芒聠聮 SELL`];}

  // PMI (Flash) 芒聙聰 schw脙陇cherer Einfluss
  else if(n.includes('pmi')||n.includes('flash')){

      nq=ym=schwach?'buy':'neut'; nk='neut';
      gr=[schwach?`PMI ${v1}<50 芒聠聮 Kontraktion 芒聠聮 Fed senkt 芒聠聮 BUY-Tendenz`:`PMI ${v1}>50 芒聠聮 Expansion 芒聠聮 neutral`,`Basis: ${basis}`];

  // RETAIL SALES 芒聙聰 Schwach = Konsument ersch脙露pft = Fed senkt = BUY
  else if(n.includes('retail sales')||n.includes('core retail')){

    }else if(fc!==null&&pv!==null){
      const schwach=fc<pv; nq=ym=schwach?'buy':'sell'; nk='neut';

    }else{nq=ym='neut';gr=['Retail Sales: Warte auf Daten'];}
  }

  // GDP 芒聙聰 Analyst: Negative GDP = Rezession = Fed-Put = BUY (paradox aber real)
  // Starkes GDP = Fed bleibt = SELL
  // Wichtig: 2 negative Quartale = technische Rezession = Fed muss handeln
  else if(n.includes('gdp')||n.includes('gross domestic')){
    if(v1!==null&&v2!==null){
      const negativ=v1<0, sehrNegativ=v1<-1, schwach=v1<v2;
      if(sehrNegativ){
        nq=ym='buy';nk='buy';
        gr=[`BIP ${v1}% stark negativ 芒聠聮 Rezession 芒聠聮 Fed-Put aktiviert 芒聠聮 aggressiv BUY NQ/YM/NK`,
           'Fed wird Zinsen schnell senken 芒聙聰 M脙陇rkte antizipieren das'];
      } else if(negativ){
        nq=ym='buy';nk='neut';
        gr=[`BIP ${v1}% negativ 芒聠聮 Rezessionsrisiko 芒聠聮 Fed senkt 芒聠聮 BUY NQ/YM`,`Basis: ${basis}`];
      } else if(schwach){
        nq=ym='buy';nk='neut';
        gr=[`BIP ${v1}% < ${v2}% 芒聠聮 Wachstum verlangsamt 芒聠聮 Fed dovish 芒聠聮 BUY`,`Basis: ${basis}`];
      } else {
        nq=ym='sell';nk='neut';
        gr=[`BIP ${v1}% > ${v2}% 芒聠聮 Wirtschaft stark 芒聠聮 Fed kein Grund zu senken 芒聠聮 SELL`,`Basis: ${basis}`];
      }
    }else if(fc!==null){
      if(fc<0){nq=ym='buy';nk='neut';gr=[`BIP-Prognose ${fc}% negativ 芒聠聮 Fed-Put erwartet 芒聠聮 BUY-Tendenz`];}
      else if(fc<pv){nq=ym='buy';nk='neut';gr=[`BIP-Prognose ${fc}% < Vorwert ${pv}% 芒聠聮 Abschw脙陇chung 芒聠聮 BUY-Tendenz`];}
      else{nq=ym='neut';nk='neut';gr=[`BIP-Prognose ${fc}% stabil 芒聠聮 neutral`];}
    }else{nq=ym='neut';gr=['BIP: Warte auf Daten'];}
  }

  // PPI 芒聙聰 K脙录hler = CPI folgt = Fed senkt = BUY
  else if(n.includes('ppi')||n.includes('producer price')){
    if(v1!==null&&v2!==null){
      const kuehl=v1<v2;
      nq=ym=kuehl?'buy':'neut'; nk='neut';
      gr=[kuehl
        ?`PPI ${v1}% < ${v2}% 芒聠聮 Erzeugerpreise sinken 芒聠聮 CPI folgt 芒聠聮 Fed senkt 芒聠聮 BUY-Tendenz`
        :`PPI ${v1}% > ${v2}% 芒聠聮 Erzeugerpreise steigen 芒聠聮 Inflation bleibt 芒聠聮 neutral/SELL-Tendenz`,
        `Basis: ${basis}`];
    }else{nq=ym='neut';gr=['PPI: Vorindikator f脙录r CPI'];}
  }

  // JACKSON HOLE 芒聙聰 Fed-Chair Rede, historisch oft dovish = BUY
  else if(n.includes('jackson')||n.includes('powell')){
    nq=ym=nk='buy';
    gr=['Jackson Hole: Fed-Chair Rede 芒聠聮 historisch oft dovish 芒聠聮 BUY-Tendenz','Markt erwartet Zinssenkungssignal'];
    hi=['Hawkisher Ton 芒聠聮 sofort SELL 芒聙聰 Signal 脙陇ndert sich mit Wortlaut'];
  }

  // MICHIGAN / UOM SENTIMENT 芒聙聰 Schwach = Rezessionsangst = Fed senkt = BUY
  else if(n.includes('uom')||n.includes('michigan')||n.includes('sentiment')){
    if(v1!==null&&v2!==null){
      const schwach=v1<v2;
      nq=ym=schwach?'buy':'sell'; nk='neut';
      gr=[schwach
        ?`Sentiment ${v1} < ${v2} 芒聠聮 Verbraucher pessimistisch 芒聠聮 Rezessionsangst 芒聠聮 Fed senkt 芒聠聮 BUY`
        :`Sentiment ${v1} > ${v2} 芒聠聮 Verbraucher optimistisch 芒聠聮 Konsum bleibt 芒聠聮 Fed hawkish 芒聠聮 SELL`,
        `Basis: ${basis}`];
    }else{nq=ym='neut';gr=['Sentiment: Warte auf Daten'];}
  }

  // CB CONSUMER CONFIDENCE 芒聙聰 wie Michigan
  else if(n.includes('cb consumer')||n.includes('consumer confidence')){
    if(v1!==null&&v2!==null){
      const schwach=v1<v2;
      nq=ym=schwach?'buy':'sell'; nk='neut';
      gr=[schwach
        ?`CB Confidence ${v1} < ${v2} 芒聠聮 Vertrauen sinkt 芒聠聮 Wirtschaft schw脙陇cher 芒聠聮 BUY`
        :`CB Confidence ${v1} > ${v2} 芒聠聮 Vertrauen steigt 芒聠聮 Konsum bleibt stark 芒聠聮 SELL`,
        `Basis: ${basis}`];
    }else{nq=ym='neut';gr=['CB Confidence: Warte auf Daten'];}
  }

  // JOLTS 芒聙聰 Weniger offene Stellen = Jobmarkt k脙录hlt = Fed senkt = BUY
  else if(n.includes('jolts')||n.includes('job opening')){
    if(v1!==null&&v2!==null){
      const kuehl=v1<v2;
      nq=ym=kuehl?'buy':'sell'; nk='neut';
      gr=[kuehl
        ?`JOLTS ${v1}M < ${v2}M 芒聠聮 Jobmarkt k脙录hlt 芒聠聮 Fed senkt 芒聠聮 BUY`
        :`JOLTS ${v1}M > ${v2}M 芒聠聮 Jobmarkt hei脙聼 芒聠聮 Fed bleibt 芒聠聮 SELL`,
        `Basis: ${basis}`];
    }else{nq=ym='neut';gr=['JOLTS: Warte auf Daten'];}
  }

  // ADP 芒聙聰 Vorindikator NFP
  else if(n.includes('adp')){
    if(v1!==null&&v2!==null){
      const schwach=v1<v2;
      nq=ym=schwach?'buy':'sell'; nk='neut';
      gr=[schwach
        ?`ADP ${v1}K < ${v2}K 芒聠聮 Jobmarkt k脙录hlt 芒聠聮 NFP-Vorindikator: BUY-Tendenz`
        :`ADP ${v1}K > ${v2}K 芒聠聮 Jobmarkt stark 芒聠聮 NFP-Vorindikator: SELL-Tendenz`,
        'Vorindikator 芒聙聰 NFP morgen/脙录bermorgen entscheidend'];
    }else{nq=ym='neut';nk='neut';gr=['ADP: NFP-Vorindikator'];}
  }

  // JOBLESS CLAIMS 芒聙聰 Mehr Claims = Jobmarkt schw脙陇cher = Fed senkt = BUY
  else if(n.includes('jobless')||n.includes('initial claim')){
    if(v1!==null&&v2!==null){
      const mehr=v1>v2;
      nq=ym=mehr?'buy':'sell'; nk='neut';
      gr=[mehr
        ?`Claims ${v1}K > ${v2}K 芒聠聮 mehr Arbeitslose 芒聠聮 Wirtschaft k脙录hlt 芒聠聮 Fed senkt 芒聠聮 BUY`
        :`Claims ${v1}K < ${v2}K 芒聠聮 Jobmarkt stark 芒聠聮 Fed bleibt 芒聠聮 SELL`,
        `Basis: ${basis}`, 'Vorindikator'];
    }else{nq=ym='neut';gr=['Jobless Claims: Vorindikator'];}
  }

  // DURABLE GOODS 芒聙聰 Schwach = Investitionen sinken = Fed senkt = BUY
  else if(n.includes('durable')){
    if(v1!==null&&v2!==null){
      const schwach=v1<v2;
      nq=ym=schwach?'buy':'neut'; nk='neut';
      gr=[schwach
        ?`Durable Goods ${v1}% < ${v2}% 芒聠聮 Investitionen sinken 芒聠聮 Fed senkt 芒聠聮 leicht BUY`
        :`Durable Goods ${v1}% > ${v2}% 芒聠聮 Investitionen stark 芒聠聮 neutral`,
        `Basis: ${basis}`];
    }else{nq=ym='neut';gr=['Durable Goods: Vorindikator'];}
  }

  // INDUSTRIAL PRODUCTION 芒聙聰 Schwach = Fed senkt = BUY
  else if(n.includes('industrial')){
    if(v1!==null&&v2!==null){
      const schwach=v1<v2;
      nq=ym=schwach?'buy':'neut'; nk='neut';

    }else{nq=ym='neut';gr=['Industrial Production: Warte auf Daten'];}
  }

  // DEFAULT
  else{nq=ym=nk='neut';gr=['Kein automatisches Signal f脙录r diesen Event'];}

  // Kontext-Boost
  nq=kontextBoost(nq);ym=kontextBoost(ym);nk=kontextBoost(nk);
  return{nq,ym,nk,gr,hi,basis};
}

// KOMBINIERTE NFP-ANALYSE
// Forschung zeigt: NFP + Wages + Unemployment zusammen
// viel zuverl脙陇ssiger als NFP alleine
// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function kombinierteNFPAnalyse(alleEvs){
  const nfp = alleEvs.find(e=>e.name.includes('Non-Farm'));
  const wages = alleEvs.find(e=>e.name.includes('Hourly Earnings'));
  const unemp = alleEvs.find(e=>e.name.includes('Unemployment Rate'));
  if(!nfp) return null;

  let buyScore=0, sellScore=0, signale=[];

  // NFP (Gewicht 3 芒聙聰 wichtigster Faktor)
  const nfpAc=parseFloat(nfp.actual||''), nfpFc=parseFloat(nfp.forecast||''), nfpPv=parseFloat(nfp.prev||'');
  const nfpV1=!isNaN(nfpAc)&&!isNaN(nfpFc)?nfpAc:nfpFc;
  const nfpV2=!isNaN(nfpAc)&&!isNaN(nfpFc)?nfpFc:nfpPv;
  if(!isNaN(nfpV1)&&!isNaN(nfpV2)){
    const d=Math.abs(nfpV1-nfpV2);
    if(d>=8){
      if(nfpV1<nfpV2){buyScore+=3*(d>20?1.5:1);signale.push(`NFP ${nfpV1}K < ${nfpV2}K 芒聠聮 schwach 芒聠聮 BUY`);}
      else{sellScore+=3*(d>20?1.5:1);signale.push(`NFP ${nfpV1}K > ${nfpV2}K 芒聠聮 stark 芒聠聮 SELL`);}
    }else{signale.push(`NFP 脦聰${d}K 芒聙聰 im Rahmen`);}
  }

  // Wages (Gewicht 2 芒聙聰 Lohninflation kritisch)
  if(wages){
    const wAc=parseFloat(wages.actual||''),wFc=parseFloat(wages.forecast||''),wPv=parseFloat(wages.prev||'');
    const wV1=!isNaN(wAc)&&!isNaN(wFc)?wAc:wFc, wV2=!isNaN(wAc)&&!isNaN(wFc)?wFc:wPv;
    if(!isNaN(wV1)&&!isNaN(wV2)){
      if(wV1<wV2){buyScore+=2;signale.push(`Wages ${wV1}% < ${wV2}% 芒聠聮 Lohndruck sinkt 芒聠聮 BUY`);}
      else if(wV1>wV2){sellScore+=2;signale.push(`Wages ${wV1}% > ${wV2}% 芒聠聮 Lohninflation 芒聠聮 SELL`);}
      else{signale.push(`Wages ${wV1}% = ${wV2}% 芒聠聮 stabil`);}
    }
  }

  // Unemployment (Gewicht 1)
  if(unemp){
    const uAc=parseFloat(unemp.actual||''),uFc=parseFloat(unemp.forecast||''),uPv=parseFloat(unemp.prev||'');
    const uV1=!isNaN(uAc)&&!isNaN(uFc)?uAc:uFc, uV2=!isNaN(uAc)&&!isNaN(uFc)?uFc:uPv;
    if(!isNaN(uV1)&&!isNaN(uV2)&&Math.abs(uV1-uV2)>=0.1){
      if(uV1>uV2){buyScore+=1;signale.push(`Unemployment ${uV1}% > ${uV2}% 芒聠聮 steigt 芒聠聮 Fed dovish 芒聠聮 BUY`);}
      else{sellScore+=1;signale.push(`Unemployment ${uV1}% < ${uV2}% 芒聠聮 sinkt 芒聠聮 Fed hawkish 芒聠聮 SELL`);}
    }
  }

  // Gesamtsignal
  const total=buyScore+sellScore;
  if(total===0) return null;
  const richtung=buyScore>sellScore?'buy':sellScore>buyScore?'sell':'neut';
  const staerke=(buyScore+sellScore)>=5?'芒職隆 Starkes':(buyScore+sellScore)>=3?'Moderates':'Schwaches';
  return{richtung, buyScore, sellScore, signale, staerke,
    label:`${staerke} NFP-Signal (${buyScore} BUY vs ${sellScore} SELL Punkte)`};
}

// TREND-MOMENTUM 芒聙聰 letzten 3 gleichen Events anschauen
// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function trendMomentum(eventName){
  // Alle vergangenen Events mit Actual f脙录r diesen Typ
  const vergangen = EVENTS
    .filter(e=>e.name===eventName && e.actual && e.actual!=='芒聙聰' && e.prev)
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,3);

  if(vergangen.length<2) return 0; // nicht genug Daten

  // Trend: positiv = Wert sinkt (gut f脙录r BUY bei Arbeitsmarkt/Inflation)
  // negativ = Wert steigt
  let trendScore=0;
  vergangen.forEach(ev=>{
    const a=parseFloat(ev.actual), p=parseFloat(ev.prev);
    if(!isNaN(a)&&!isNaN(p)) trendScore += (a<p)?1:-1;
  });
  return trendScore; // +3 = 3x in Folge gesunken, -3 = 3x gestiegen
}

// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
// SIGNALST脙聞RKE 芒聙聰 schwach / moderat / stark
// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function signalStaerke(ev, sigRichtung){
  if(sigRichtung==='neut') return '';
  const n=ev.name;
  const ac=parseFloat(ev.actual||''), fc=parseFloat(ev.forecast||''), pv=parseFloat(ev.prev||'');
  const vergleich = !isNaN(ac)&&!isNaN(fc) ? Math.abs(ac-fc) : !isNaN(fc)&&!isNaN(pv) ? Math.abs(fc-pv) : 0;

  // Momentum dazurechnen
  const momentum = trendMomentum(ev.name);
  const momentumBoost = Math.abs(momentum)>=2 ? 1 : 0; // 2+ in Folge = Boost

  // Schwellenwerte je nach Event-Typ
  let schwach=0, stark=0;
  if(n.includes('Non-Farm')||n.includes('payroll')){schwach=8;stark=25;}
  else if(n.includes('CPI')||n.includes('PCE')){schwach=0.05;stark=0.2;}
  else if(n.includes('GDP')){schwach=0.3;stark=1.0;}
  else if(n.includes('Retail')){schwach=0.2;stark=0.8;}
  else{schwach=0.1;stark=0.5;}

  if(vergleich>=stark || momentumBoost){
    return momentum!==0?` 脗路 Trend ${momentum>0?'芒聠聯芒聠聯':'芒聠聭芒聠聭'} (${Math.abs(momentum)}x in Folge)`:'';
  }
  return '';
}

// SIGNAL HIERARCHIE 芒聙聰 1-2-3 Regel
// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function hierarchieSignal(evs){
  const sv={buy:1,sell:-1,neut:0};

  const highEvs=evs.filter(e=>e.impact==='high');
  const midEvs=evs.filter(e=>e.impact==='med');
  const lowEvs=evs.filter(e=>e.impact==='low');

  // Stufe 1+2: High-Impact vorhanden 芒聠聮 nur die z脙陇hlen
  // Gewichtung: gro脙聼es Signal = mehr Gewicht
  if(highEvs.length>0){
    let nqS=0,ymS=0,nkS=0,totalW=0;
    highEvs.forEach(ev=>{
      const s=sig(ev);
      const ac=parseFloat(ev.actual||''),fc=parseFloat(ev.forecast||''),pv=parseFloat(ev.prev||'');
      const delta=!isNaN(ac)&&!isNaN(fc)?Math.abs(ac-fc):!isNaN(fc)&&!isNaN(pv)?Math.abs(fc-pv):0;
      // Momentum-Boost: wenn 2+ Events in Folge gleiche Richtung 芒聠聮 mehr Gewicht
      const momentum=trendMomentum(ev.name);
      const w = 1 + (delta>20?0.5:0) + (Math.abs(momentum)>=2?0.5:0);
      nqS+=sv[s.nq]*w; ymS+=sv[s.ym]*w; nkS+=sv[s.nk]*w; totalW+=w;
    });
    const avg=v=>v/totalW;
    // Signalst脙陇rke f脙录r Label
    const maxScore=Math.max(Math.abs(avg(nqS)),Math.abs(avg(ymS)));
    const staerke=maxScore>0.7?'芒職隆 Starkes':maxScore>0.4?'Moderates':'Schwaches';
    const d=v=>v>0.2?'buy':v<-0.2?'sell':'neut';
    return{
      nq:d(avg(nqS)),ym:d(avg(ymS)),nk:d(avg(nkS)),
      staerke, stufe:1,
      label:`${staerke} Signal 芒聙聰 ${highEvs.length} High-Impact Event${highEvs.length>1?'s':''}`,
      events:highEvs
    };
  }

  // Stufe 3: Nur Mid 芒聠聮 Durchschnitt
  if(midEvs.length>0){
    let nqS=0,ymS=0,nkS=0;
    midEvs.forEach(ev=>{const s=sig(ev);nqS+=sv[s.nq];ymS+=sv[s.ym];nkS+=sv[s.nk];});
    const n=midEvs.length;
    const d=v=>v/n>0.3?'buy':v/n<-0.3?'sell':'neut';
    const maxScore=Math.max(Math.abs(nqS/n),Math.abs(ymS/n));
    const staerke=maxScore>0.7?'芒職隆 Starkes':maxScore>0.4?'Moderates':'Schwaches';
    return{
      nq:d(nqS),ym:d(ymS),nk:d(nkS),
      staerke, stufe:3,
      label:`${staerke} Signal 芒聙聰 ${midEvs.length} Mid-Impact Events (kein High heute)`,
      events:midEvs
    };
  }

  if(lowEvs.length>0) return{nq:'neut',ym:'neut',nk:'neut',staerke:'',stufe:3,label:'Nur Low-Impact 芒聙聰 kein klares Signal',events:lowEvs};
  return null;
}

function domSig(evs){
  if(evs.some(e=>e.impact==='claude')&&!evs.some(e=>e.impact==='high'||e.impact==='med'))return'claude';
  const h=hierarchieSignal(evs.filter(e=>e.impact!=='claude'));
  if(!h)return'neut';
  // F脙录r Kalender: nehme NQ als Hauptsignal
  const votes=[h.nq,h.ym].filter(v=>v!=='neut');
  if(votes.length===0)return'neut';
  const b=votes.filter(v=>v==='buy').length;
  const s=votes.filter(v=>v==='sell').length;
  return b>s?'buy':s>b?'sell':'neut';
}

const WOTAGE=['So','Mo','Di','Mi','Do','Fr','Sa'];
const heute=new Date();

const pad=n=>String(n).padStart(2,'0');
const tKey=(j,m,t)=>`${j}-${pad(m+1)}-${pad(t)}`;

function amTag(k){return EVENTS.filter(e=>e.date===k).sort((a,b)=>({high:0,med:1,low:2,claude:-1}[a.impact]-{high:0,med:1,low:2,claude:-1}[b.impact]));}
function imMonat(j,m){return EVENTS.filter(e=>e.date.startsWith(`${j}-${pad(m+1)}-`));}
function vorabende(){
  const s=new Set();
  EVENTS.forEach(ev=>{
    if(ev.impact!=='high')return;
    const d=new Date(ev.date+'T12:00:00');
    if(isNaN(d.getTime()))return;
    d.setDate(d.getDate()-1);
    s.add(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
  });
  return s;
}

function renderKalender(){
  document.getElementById('navMonth').textContent=`${MONATE[aktM]} ${aktJ}`;
  const grid=document.getElementById('calGrid'),banner=document.getElementById('noDataBanner');
  grid.innerHTML='';
  const moEvs=imMonat(aktJ,aktM);
  if(!moEvs.length){grid.style.display='none';banner.style.display='block';return;}
  grid.style.display='grid';banner.style.display='none';

  const erst=(new Date(aktJ,aktM,1).getDay()+6)%7,tage=new Date(aktJ,aktM+1,0).getDate(),vb=vorabende();
  const evMap={};moEvs.forEach(ev=>{const t=parseInt(ev.date.split('-')[2]);(evMap[t]||(evMap[t]=[])).push(ev);});

  for(let i=0;i<erst;i++){const z=document.createElement('div');z.className='day empty';grid.appendChild(z);}
  for(let t=1;t<=tage;t++){
    const z=document.createElement('div');z.className='day';
    const k=tKey(aktJ,aktM,t);
    const istH=t===heute.getDate()&&aktM===heute.getMonth()&&aktJ===heute.getFullYear();
    if(istH)z.classList.add('today');
    if(selT===k)z.classList.add('active');
    const evs=evMap[t]||[];
    const istVb=vb.has(k)&&!evs.some(e=>e.impact==='high');
    const dom=evs.length?domSig(evs):'neut';
    if(dom==='buy')z.classList.add('day-buy');
    else if(dom==='sell')z.classList.add('day-sell');
    else if(dom==='claude')z.classList.add('day-claude');
    if(istVb)z.classList.add('day-pre');

    const dn=document.createElement('div');dn.className='dnum';dn.textContent=t;z.appendChild(dn);
    if(evs.length){
      const dr=document.createElement('div');dr.className='dots';
      [...evs].sort((a,b)=>({high:0,med:1,low:2,claude:-1}[a.impact]-{high:0,med:1,low:2,claude:-1}[b.impact])).slice(0,4).forEach(ev=>{
        const d=document.createElement('div');d.className=`dot ${ev.impact}`;dr.appendChild(d);
      });
      z.appendChild(dr);
      if(dom==='buy'||dom==='sell'){const ds=document.createElement('div');ds.className=`day-sig ${dom}`;ds.textContent=dom==='buy'?'芒聳虏':'芒聳录';z.appendChild(ds);}
      else if(dom==='claude'){const ds=document.createElement('div');ds.className='day-sig';ds.style.color='#a78bfa';ds.textContent='冒聼聼拢';z.appendChild(ds);}
    }else if(istVb){const ds=document.createElement('div');ds.className='day-sig pre';ds.textContent='芒職聽';z.appendChild(ds);}

    z.onclick=()=>{if(evs.length||istVb)oeffneTag(k,t);};
    grid.appendChild(z);
  }

  // Status aktualisieren
  const kontextIcon=KONTEXT.modus==='bull'?'冒聼聼垄':KONTEXT.modus==='bear'?'冒聼聰麓':'芒職陋';
  const einpreisungText=KONTEXT.einpreisung==='stark'?'脗路 芒職聽 Stark eingepreist':KONTEXT.einpreisung==='schwach'?'脗路 冒聼聮隆 Wenig eingepreist':'';
  document.getElementById('statusText').textContent=`${kontextIcon} ${KONTEXT.description} ${einpreisungText}`;
}

      <div class="kombi-title">${stufenLabel} 芒聙聰 ${hSig.label}</div>
      <div class="kombi-signals">
        <div class="kombi-box"><div class="kombi-lbl">NQ1!</div><div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:${sigColor(hSig.nq)}">${sigText(hSig.nq)}</div></div>
        <div class="kombi-box"><div class="kombi-lbl">YM1!</div><div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:${sigColor(hSig.ym)}">${sigText(hSig.ym)}</div></div>
        <div class="kombi-box"><div class="kombi-lbl">NK1!</div><div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:${sigColor(hSig.nk)}">${sigText(hSig.nk)}</div></div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:8px;color:#5a5a5a;margin-top:5px;">${KONTEXT.description}${KONTEXT.einpreisung==='stark'?' 脗路 芒職聽 Stark eingepreist 芒聙聰 sell the news Risiko':KONTEXT.einpreisung==='schwach'?' 脗路 冒聼聮隆 Wenig eingepreist 芒聙聰 mehr Upside':''}</div>
    `;
    con.appendChild(kb);
  } else {
    const bn=document.createElement('div');bn.className='info-banner';
    bn.innerHTML=`芒職隆 Signal: Prognose vs. Vorwert 脗路 ${KONTEXT.description}`;
    con.appendChild(bn);
  }

  // Vorabend
  const mor=new Date(aktJ,aktM,tag+1);
  const mk=`${mor.getFullYear()}-${pad(mor.getMonth()+1)}-${pad(mor.getDate())}`;
  const mH=EVENTS.filter(e=>e.date===mk&&e.impact==='high');
  if(mH.length&&!evs.some(e=>e.impact==='high')){
    const vb=document.createElement('div');vb.className='vorabend';
    vb.innerHTML=`芒職聽 Vorabend 芒聙聰 Morgen ${mH.length} High-Impact Event(s):<br>${mH.map(e=>`<b>${e.name}</b> ${e.time} Uhr`).join(' 脗路 ')}`;
    con.appendChild(vb);
  }

  if(!evs.length){
    const ne=document.createElement('div');ne.className='no-events';ne.textContent='Keine Events';con.appendChild(ne);return;
  }

  evs.forEach(ev=>{
    // Claude Update Event
    if(ev.impact==='claude'){
      const karte=document.createElement('div');karte.className='ev-card claude';
      karte.innerHTML=`<div class="ev-top"><div class="ev-flag">冒聼聼拢</div><div class="ev-name" style="color:#a78bfa;font-weight:600;">${ev.name}</div><div class="imp claude">Update</div></div><div style="padding:0 11px 12px;"><div style="background:rgba(167,139,250,.08);border-radius:6px;padding:10px 12px;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:#a78bfa;font-weight:500;margin-bottom:5px;">芒職隆 Daten-Update f脙陇llig</div><div style="font-family:'DM Mono',monospace;font-size:10px;color:#9d8fd4;line-height:1.7;">Die Daten sind 3 Monate alt.<br>Schreib Claude: <span style="color:#a78bfa;font-weight:600;">"Update Futures Kalender"</span></div></div></div>`;
      con.appendChild(karte);return;
    }

    const s=sig(ev);
    const fcW=ev.forecast&&ev.forecast!=='芒聙聰'?ev.forecast:'芒聙聰';
    const pvW=ev.prev&&ev.prev!=='芒聙聰'?ev.prev:'芒聙聰';
    const acW=ev.actual&&ev.actual!=='芒聙聰'?ev.actual:'芒聙聰';
    let acKls='';
    if(ev.actual&&ev.actual!=='芒聙聰'){const a=pZ(ev.actual),f=pZ(ev.forecast);if(a!==null&&f!==null)acKls=a>f?'beat':'miss';}
    const sb=(sg,lbl)=>{const k2=sg==='buy'?'buy':sg==='sell'?'sell':'neut';return`<div class="sbox"><div class="sfut">${lbl}</div><div class="sbadge ${k2}">${sg==='buy'?'芒聳虏 BUY':sg==='sell'?'芒聳录 SELL':'芒聙聯 NEUT'}</div></div>`;};
    // Momentum-Trend hinzuf脙录gen
    const momentum=trendMomentum(ev.name);
    const momentumText=Math.abs(momentum)>=2
      ?`Trend: ${momentum>0?'芒聠聯':'芒聠聭'} ${Math.abs(momentum)}x in Folge ${momentum>0?'(verst脙陇rkt BUY)':'(verst脙陇rkt SELL)'}`
      :'';
    if(momentumText) s.gr.push(momentumText);

    const az=s.gr.filter(Boolean).map(g=>`<div class="aline"><span class="ai">芒聠聮</span><span>${g}</span></div>`).join('');
    const hz=s.hi.filter(Boolean).map(h=>`<div class="aline warn"><span class="ai">芒職聽</span><span>${h}</span></div>`).join('');
    const impLabel=ev.impact==='high'?'High':ev.impact==='med'?'Mid':'Low';

    const karte=document.createElement('div');karte.className=`ev-card ${ev.impact}`;
    karte.innerHTML=`<div class="ev-top"><div class="ev-time">${ev.time} Uhr</div><div class="ev-flag">${ev.flag}</div><div class="ev-name">${ev.name}</div><div class="imp ${ev.impact}">${impLabel}</div></div><div class="zahlen"><div class="zbox"><div class="zlbl">Prognose</div><div class="zval">${fcW}</div></div><div class="zbox"><div class="zlbl">Aktuell</div><div class="zval ${acKls}">${acW}</div></div><div class="zbox"><div class="zlbl">Vorher</div><div class="zval">${pvW}</div></div></div><div class="sig-wrap"><div class="sig-label">Signal</div><div class="sig-grid">${sb(s.nq,'NQ1!')}${sb(s.ym,'YM1!')}${sb(s.nk,'NK1!')}</div><div class="sig-basis">${s.basis?`Basis: ${s.basis}`:''}</div></div><div class="analyse"><div class="analyse-titel">Analyse</div>${az}${hz}</div>`;
    con.appendChild(karte);
  });

  document.getElementById('detail').classList.add('show');
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDay(){selT=null;document.getElementById('detail').classList.remove('show');renderKalender();}
function changeMonth(d){aktM+=d;if(aktM<0){aktM=11;aktJ--;}if(aktM>11){aktM=0;aktJ++;}closeDay();renderKalender();}
function goToday(){aktJ=heute.getFullYear();aktM=heute.getMonth();closeDay();renderKalender();const k=tKey(aktJ,aktM,heute.getDate());if(amTag(k).length)oeffneTag(k,heute.getDate());}

// START
berechneKontext();
aktualisiereVorwerte();
renderKalender();
const k=tKey(aktJ,aktM,heute.getDate());
if(amTag(k).length)oeffneTag(k,heute.getDate());
</script>
